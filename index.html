<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Peetsold Weddings & Events</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: Georgia, serif;
        color: white;
        min-height: 100vh;

        background-image: url("Rosa-bloemen-bewerkt.png");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;

        position: relative;
    }

    .overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.35);
    }

    header {
        position: fixed;
        top: 40px;
        left: 40px;
        z-index: 2;
    }

    .logo {
        width: 140px;
		filter: brightness(0) invert(1);

    }

    main {
        min-height: 100vh;

        display: flex;
        align-items: center;

        padding-left: 8%;
        padding-right: 8%;

        position: relative;
        z-index: 2;
    }

    .content {
        max-width: 520px;
    }

    h1 {
        font-size: clamp(2.5rem, 5vw, 4.5rem);
        font-weight: normal;

        margin-bottom: 30px;
        line-height: 1.1;
    }

    p {
        font-size: 1.2rem;
        line-height: 1.8;

        margin-bottom: 40px;

        opacity: 0.95;
    }

    .coming-soon {
        font-size: 1rem;
        letter-spacing: 3px;
        text-transform: uppercase;
    }

    .signature {
    margin-top: 100px;
    letter-spacing: 0.5px;

    }

    @media (max-width: 768px) {

        header {
            top: 25px;
            left: 25px;
        }

        .logo {
            width: 100px;
        }

        main {
            align-items: flex-end;
            padding-bottom: 80px;
        }

        h1 {
            font-size: 2.4rem;
        }

        p {
            font-size: 1rem;
        }

        .signature {
            margin-top: 50px;
        }
    }
</style>

</head>

<body>

<div class="overlay"></div>

<header>
    <img src="logo.png" alt="Peetsold-Logo (no background).png" class="logo">
</header>

<main>
    <div class="content">

        <h1>A new chapter is unfolding.</h1>

        <p>
            Our website is currently being crafted with the same care and
            attention we bring to every celebration.
        </p>

        <div class="coming-soon">
            Coming soon.
        </div>

        <div class="signature">
            La vie en Rosa ♥
        </div>

    </div>
</main>

</body>
</html>
